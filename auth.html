<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login - SpotNow</title>
</head>
<body style="background:#fff7f3;">
    <div class="container" style="margin-top: 100px;">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card glass-card p-5">
                    <div class="text-center mb-4">
                        <button class="btn btn-warning me-2" onclick="toggle(true)">Login</button>
                        <button class="btn btn-outline-warning" onclick="toggle(false)">Sign Up</button>
                    </div>
                    
                    <form id="authForm">
                        <h4 id="title" class="fw-bold mb-4">Login</h4>
                        <input type="text" id="user" class="form-control mb-3" placeholder="Username" required>
                        <input type="password" id="pass" class="form-control mb-4" placeholder="Password" required>
                        <button type="submit" class="btn btn-warning w-100">Continue</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://spotnow-backend.onrender.com";
        let isLogin = true;

        function toggle(val) {
            isLogin = val;
            document.getElementById('title').innerText = isLogin ? "Login" : "Sign Up";
        }

        document.getElementById('authForm').onsubmit = async e => {
            e.preventDefault();
            const path = isLogin ? "login" : "signup";
            const res = await fetch(`${API_URL}/api/${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: document.getElementById('user').value, 
                    password: document.getElementById('pass').value 
                })
            });
            const data = await res.json();
            if(res.ok) {
                if(isLogin) {
                    localStorage.setItem('spotnow_user', data.username);
                    window.location.href = "explore.html";
                } else {
                    alert("Account created! Now login.");
                    toggle(true);
                }
            } else { alert(data.message); }
        };
    </script>
</body>
</html>
