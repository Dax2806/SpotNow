<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Explore - SpotNow</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top px-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">SPOTNOW</a>
            <div class="d-flex align-items-center">
                <a href="add-spot.html" class="nav-link me-3">Add Spot</a>
                <a id="authBtn" href="auth.html" class="btn btn-warning">Log In</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <h2 class="fw-bold text-center mb-4">Discover Hidden Gems</h2>
        
        <div id="mainExploreMap" class="mb-4" style="height: 400px;"></div>

        <div class="d-flex justify-content-center gap-2 mb-5">
            <button class="btn btn-outline-warning" onclick="loadSpots('')">All</button>
            <button class="btn btn-outline-warning" onclick="loadSpots('cafe')">Cafes</button>
            <button class="btn btn-outline-warning" onclick="loadSpots('park')">Parks</button>
        </div>

        <div class="row g-4" id="spotsContainer"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = "https://spotnow-backend.onrender.com";
        const map = L.map('mainExploreMap').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let markers = [];

        async function loadSpots(cat = '') {
            const res = await fetch(`${API_URL}/api/spots${cat ? '?category='+cat : ''}`);
            const spots = await res.json();
            const container = document.getElementById('spotsContainer');
            container.innerHTML = '';
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            spots.forEach(spot => {
                const user = localStorage.getItem('spotnow_user');
                const card = `
                    <div class="col-md-4">
                        <div class="card explore-card h-100">
                            <div class="position-relative">
                                <img src="${API_URL}${spot.imageUrl}" class="card-img-top" style="height:200px; object-fit:cover;">
                                ${user ? `<button onclick="deleteSpot('${spot._id}')" class="btn btn-light position-absolute top-0 end-0 m-2 shadow-sm"><i class="fas fa-times text-danger"></i></button>` : ''}
                            </div>
                            <div class="card-body">
                                <h5 class="fw-bold">${spot.name}</h5>
                                <p class="text-muted small">${spot.location}</p>
                                <p>${spot.description}</p>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += card;
                if(spot.lat) {
                    const m = L.marker([spot.lat, spot.lng]).addTo(map).bindPopup(spot.name);
                    markers.push(m);
                }
            });
            if(markers.length) map.fitBounds(L.featureGroup(markers).getBounds());
        }

        async function deleteSpot(id) {
            if(confirm("Delete this spot?")) {
                await fetch(`${API_URL}/api/spots/${id}`, { method: 'DELETE' });
                loadSpots();
            }
        }

        // Auth UI
        const user = localStorage.getItem('spotnow_user');
        if(user) {
            const btn = document.getElementById('authBtn');
            btn.innerHTML = `${user} (Logout)`;
            btn.onclick = () => { localStorage.removeItem('spotnow_user'); location.reload(); };
        }

        loadSpots();
    </script>
</body>
</html>
