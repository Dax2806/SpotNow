<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Add Spot - SpotNow</title>
</head>
<body style="background:#fff7f3;">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card glass-card p-5 shadow-lg">
                    <h2 class="fw-bold text-primary mb-4 text-center">Share a Hidden Gem</h2>
                    <form id="addSpotForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Spot Name</label>
                                <input type="text" id="name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Category</label>
                                <select id="category" class="form-select" required>
                                    <option value="cafe">Cafe</option>
                                    <option value="park">Park</option>
                                    <option value="viewpoint">Viewpoint</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Click Map to Pin Location</label>
                            <div id="mapSelection" style="height: 300px;"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea id="description" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Upload Photo</label>
                            <input type="file" id="image" class="form-control" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 py-3">Submit Spot</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = "https://spotnow-backend.onrender.com";
        
        // Bouncer
        if(!localStorage.getItem('spotnow_user')) {
            alert("Please login first!");
            window.location.href = "auth.html";
        }

        // Map Setup
        let lat, lng, marker;
        const map = L.map('mapSelection').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('click', e => {
            lat = e.latlng.lat; lng = e.latlng.lng;
            if(marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);
        });

        document.getElementById('addSpotForm').onsubmit = async e => {
            e.preventDefault();
            if(!lat) return alert("Pin the location on the map!");

            const fd = new FormData();
            fd.append('name', document.getElementById('name').value);
            fd.append('category', document.getElementById('category').value);
            fd.append('description', document.getElementById('description').value);
            fd.append('image', document.getElementById('image').files[0]);
            fd.append('lat', lat); fd.append('lng', lng);

            const res = await fetch(`${API_URL}/api/spots`, { method: 'POST', body: fd });
            if(res.ok) { alert("Success!"); window.location.href="explore.html"; }
        };
    </script>
</body>
</html>
